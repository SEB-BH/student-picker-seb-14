<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pick-A-Student</title>
    <style>
      body {
        font-family: Helvetica;
        font-weight: lighter;
        font-size: 20px;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #container {
        text-align: center;
      }

      ul {
        padding: 0;
      }

      li {
        list-style: none;
        margin: 10px 0;
      }

      button {
        margin: 10px;
        font-size: 20px;
        padding: 10px;
      }

      input {
        font-size: 18px;
        padding: 5px;
        width: 50px;
        text-align: center;
      }
    </style>
    <link rel="icon" href="woman-raising-hand-emoji.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="woman-raising-hand-emoji.png" />
  </head>

  <body>
    <div>
      <label for="group-size">Group Size:</label>
      <input id="group-size" type="number" min="1" value="3" />
      <button id="create-group">Create Group</button>
    </div>
    <div id="container">
      <h2>Groups</h2>
      <ul id="groups"></ul>
    </div>

    <script type="text/javascript">
      const students = [
  "Abdulaziz Mohamed A. Makhlooq",
  "Abdullah Mohammed suleman A.butt",
  "Abeer Ahmed Abdulrahman",
  "Alghaleya Almahmeed",
  "Ali Arif Rajab",
  "Ali Husain Mohammed Saeed Abdul Alaliwat",
  "Ali hussain murad ghareeb",
  "Ali Jaafar Alasfoor",
  "Ali Saleh Mahdi Saleh Ali Abdulla",
  "Bayan Abdulla Ali Markhoos",
  "Fadhel Sayed Abbas hassan hashem Mohamed",
  "Hasan Ali Jasim",
  "Hawra Abdullah Ali Mohamed Ali Markhoos",
  "Hawra Sayed Abbas Ali Ebrahim Sharaf",
  "Husain Ali Abdulmohsen Ateya Ali Abdulrasool",
  "Husain Ali Isa Abdulnabi Jasim Almajed",
  "Hussain Zuhair Almutawa",
  "Jassim Mohamed A. Alawainati",
  "Manar Alhamad",
  "Marwa Mohamed Anwar Ghamtail",
  "Mohammed Taher Saleh Homeed",
  "Rawan Salah J. Mohamed Haji",
  "Rayyan Jameel A. Rashed",
  "Ruqaya Sayed Adel S. Alsammak",
  "Salman Ghazi A. Mahmood",
  "Sayed Mohsen Kadhem Abdulla Ahmed Abdullah",
  "Walaa Ali Hasan Abdulhusain Abdulrahim",
  "Zainab Abduljalil M. Moosa",
  "Zainab Ali Salman Abdullah Ahmed",
]

      let remainingStudents = [...students]
      let groupNumber = 1
      const groupsList = document.getElementById('groups')
      const createGroupButton = document.getElementById('create-group')
      const groupSizeInput = document.getElementById('group-size')

      createGroupButton.addEventListener('click', function () {
        const groupSize = parseInt(groupSizeInput.value, 10)

        if (remainingStudents.length >= groupSize) {
          const group = []
          for (let i = 0; i < groupSize; i++) {
            const randomIndex = Math.floor(
              Math.random() * remainingStudents.length
            )
            group.push(remainingStudents.splice(randomIndex, 1)[0])
          }
          const li = document.createElement('li')
          li.textContent = `Group ${groupNumber++}: ${group.join(', ')}`
          groupsList.appendChild(li)
        } else if (remainingStudents.length > 0) {
          // Handle remaining students if fewer than group size
          const li = document.createElement('li')
          li.textContent = `Group ${groupNumber++} (less than ${groupSize}): ${remainingStudents.join(
            ', '
          )}`
          groupsList.appendChild(li)
          remainingStudents = []
        }

        if (remainingStudents.length === 0) {
          createGroupButton.disabled = true
        }
      })
    </script>
  </body>
</html>
